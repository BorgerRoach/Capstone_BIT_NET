frr defaults traditional
hostname agg8
service integrated-vtysh-config

!
! =========================
! VRF
! =========================
vrf WAREHOUSE
 vni 50010
exit-vrf

!
! =========================
! Loopback
! =========================
interface lo
 ip address 10.255.1.8/32
exit

!
! =========================
! Core Facing Interfaces
! =========================
interface eth1
 description TO-CORE3
 ip address 10.0.0.37/31
exit

interface eth2
 description TO-CORE4
 ip address 10.0.0.39/31
exit

!
! =========================
! ToR Facing Interfaces
! =========================
interface eth3
 description TO-TOR13
 ip address 10.0.16.51/31
exit

interface eth4
 description TO-TOR14
 ip address 10.0.16.55/31
exit

interface eth5
 description TO-TOR15
 ip address 10.0.16.59/31
exit

interface eth6
 description TO-TOR16
 ip address 10.0.16.63/31
exit

!
! =========================
! BGP
! =========================
router bgp 65108
 no bgp ebgp-requires-policy
 bgp router-id 10.255.1.8

 !
 ! ---- Core Neighbors ----
 !
 neighbor 10.0.0.36 remote-as 65003
 neighbor 10.0.0.38 remote-as 65004

 !
 ! ---- ToR Neighbors ----
 !
 neighbor 10.0.16.50 remote-as 65213
 neighbor 10.0.16.54 remote-as 65214
 neighbor 10.0.16.58 remote-as 65215
 neighbor 10.0.16.62 remote-as 65216

 !
 ! =========================
 ! Underlay
 ! =========================
 address-family ipv4 unicast
  network 10.255.1.8/32
 exit-address-family

 !
 ! =========================
 ! EVPN
 ! =========================
 address-family l2vpn evpn
  neighbor 10.0.0.36 activate
  neighbor 10.0.0.38 activate
  neighbor 10.0.16.50 activate
  neighbor 10.0.16.54 activate
  neighbor 10.0.16.58 activate
  neighbor 10.0.16.62 activate
  advertise-all-vni
 exit-address-family

 !
 ! =========================
 ! Tenant VRF
 ! =========================
 address-family ipv4 unicast vrf WAREHOUSE
  redistribute connected
 exit-address-family