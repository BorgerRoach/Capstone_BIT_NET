frr defaults traditional
hostname core4
service integrated-vtysh-config

!
! =========================
! Loopback
! =========================
interface lo
 ip address 10.255.0.4/32
exit

!
! =========================
! Aggregation Facing Interfaces
! =========================
interface eth1
 description TO-AGG3
 ip address 10.0.0.10/31
exit

interface eth2
 description TO-AGG4
 ip address 10.0.0.22/31
exit

interface eth3
 description TO-AGG6
 ip address 10.0.0.30/31
exit

interface eth4
 description TO-AGG8
 ip address 10.0.0.38/31
exit

!
! =========================
! BGP
! =========================
router bgp 65004
 no bgp ebgp-requires-policy
 bgp router-id 10.255.0.4

 !
 ! ---- Aggregation Neighbors ----
 !
 neighbor 10.0.0.9 remote-as 65103
 neighbor 10.0.0.21 remote-as 65104
 neighbor 10.0.0.29 remote-as 65106
 neighbor 10.0.0.37 remote-as 65108

 !
 ! =========================
 ! Underlay
 ! =========================
 address-family ipv4 unicast
  network 10.255.0.4/32
 exit-address-family

 !
 ! =========================
 ! EVPN Control Plane
 ! =========================
 address-family l2vpn evpn
  neighbor 10.0.0.9 activate
  neighbor 10.0.0.21 activate
  neighbor 10.0.0.29 activate
  neighbor 10.0.0.37 activate
 exit-address-family