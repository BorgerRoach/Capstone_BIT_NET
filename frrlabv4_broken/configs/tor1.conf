frr defaults traditional
hostname tor1
service integrated-vtysh-config

!
! =========================
! VRF
! =========================
vrf WAREHOUSE
 vni 50010
exit-vrf

!
! =========================
! Loopback
! =========================
interface lo
 ip address 10.255.1.1/32
exit

!
! =========================
! Uplink Interfaces to AGGs
! =========================
interface eth1
 description TO-AGG1
 ip address 10.0.16.2/31
exit

interface eth2
 description TO-AGG2
 ip address 10.0.16.6/31
exit

!
! =========================
! Downlink / Access Ports
! =========================
interface eth3
 no ip address
exit

!
! Bridge for VLAN 10
interface bridge
 bridge-vlan-aware yes
exit

vlan 10
 vni 10010
exit

! IRB interface for VLAN 10
interface vlan10
 vrf WAREHOUSE
 ip address 192.168.10.1/24
exit

! VXLAN interface
interface vxlan10010
 vxlan id 10010
 vxlan local-tunnelip 10.255.1.1
 bridge-group 10
exit

!
! =========================
! BGP
! =========================
router bgp 65201
 no bgp ebgp-requires-policy
 bgp router-id 10.255.1.1

 !
 ! ---- eBGP uplinks to AGGs ----
 !
 neighbor 10.0.16.1 remote-as 65101
 neighbor 10.0.16.5 remote-as 65102

 !
 ! =========================
 ! Underlay IPv4
 ! =========================
 address-family ipv4 unicast
  network 10.255.1.1/32
 exit-address-family

 !
 ! =========================
 ! EVPN
 ! =========================
 address-family l2vpn evpn
  neighbor 10.0.16.1 activate
  neighbor 10.0.16.5 activate
  advertise-all-vni
  advertise-svi-ip
 exit-address-family

 !
 ! =========================
 ! Tenant VRF
 ! =========================
 address-family ipv4 unicast vrf WAREHOUSE
  redistribute connected
 exit-address-family