frr defaults traditional
hostname agg7
service integrated-vtysh-config

!
! =========================
! VRF
! =========================
vrf WAREHOUSE
 vni 50010
exit-vrf

!
! =========================
! Loopback
! =========================
interface lo
 ip address 10.255.1.7/32
exit

!
! =========================
! Core Facing Interfaces
! =========================
interface eth1
 description TO-CORE1
 ip address 10.0.0.33/31
exit

interface eth2
 description TO-CORE2
 ip address 10.0.0.35/31
exit

!
! =========================
! ToR Facing Interfaces
! =========================
interface eth3
 description TO-TOR13
 ip address 10.0.16.49/31
exit

interface eth4
 description TO-TOR14
 ip address 10.0.16.53/31
exit

interface eth5
 description TO-TOR15
 ip address 10.0.16.57/31
exit

interface eth6
 description TO-TOR16
 ip address 10.0.16.61/31
exit

!
! =========================
! BGP
! =========================
router bgp 65107
 no bgp ebgp-requires-policy
 bgp router-id 10.255.1.7

 !
 ! ---- Core Neighbors ----
 !
 neighbor 10.0.0.32 remote-as 65001
 neighbor 10.0.0.34 remote-as 65002

 !
 ! ---- ToR Neighbors ----
 !
 neighbor 10.0.16.48 remote-as 65213
 neighbor 10.0.16.52 remote-as 65214
 neighbor 10.0.16.56 remote-as 65215
 neighbor 10.0.16.60 remote-as 65216

 !
 ! =========================
 ! Underlay
 ! =========================
 address-family ipv4 unicast
  network 10.255.1.7/32
 exit-address-family

 !
 ! =========================
 ! EVPN
 ! =========================
 address-family l2vpn evpn
  neighbor 10.0.0.32 activate
  neighbor 10.0.0.34 activate
  neighbor 10.0.16.48 activate
  neighbor 10.0.16.52 activate
  neighbor 10.0.16.56 activate
  neighbor 10.0.16.60 activate
  advertise-all-vni
 exit-address-family

 !
 ! =========================
 ! Tenant VRF
 ! =========================
 address-family ipv4 unicast vrf WAREHOUSE
  redistribute connected
 exit-address-family