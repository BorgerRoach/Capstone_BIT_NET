frr defaults traditional
hostname agg6
service integrated-vtysh-config

!
! =========================
! VRF
! =========================
vrf WAREHOUSE
 vni 50010
exit-vrf

!
! =========================
! Loopback
! =========================
interface lo
 ip address 10.255.1.6/32
exit

!
! =========================
! Core Facing Interfaces
! =========================
interface eth1
 description TO-CORE3
 ip address 10.0.0.29/31
exit

interface eth2
 description TO-CORE4
 ip address 10.0.0.31/31
exit

!
! =========================
! ToR Facing Interfaces
! =========================
interface eth3
 description TO-TOR9
 ip address 10.0.16.35/31
exit

interface eth4
 description TO-TOR10
 ip address 10.0.16.39/31
exit

interface eth5
 description TO-TOR11
 ip address 10.0.16.43/31
exit

interface eth6
 description TO-TOR12
 ip address 10.0.16.47/31
exit

!
! =========================
! BGP
! =========================
router bgp 65106
 no bgp ebgp-requires-policy
 bgp router-id 10.255.1.6

 !
 ! ---- Core Neighbors ----
 !
 neighbor 10.0.0.28 remote-as 65003
 neighbor 10.0.0.30 remote-as 65004

 !
 ! ---- ToR Neighbors ----
 !
 neighbor 10.0.16.34 remote-as 65209
 neighbor 10.0.16.38 remote-as 65210
 neighbor 10.0.16.42 remote-as 65211
 neighbor 10.0.16.46 remote-as 65212

 !
 ! =========================
 ! Underlay
 ! =========================
 address-family ipv4 unicast
  network 10.255.1.6/32
 exit-address-family

 !
 ! =========================
 ! EVPN
 ! =========================
 address-family l2vpn evpn
  neighbor 10.0.0.28 activate
  neighbor 10.0.0.30 activate
  neighbor 10.0.16.34 activate
  neighbor 10.0.16.38 activate
  neighbor 10.0.16.42 activate
  neighbor 10.0.16.46 activate
  advertise-all-vni
 exit-address-family

 !
 ! =========================
 ! Tenant VRF
 ! =========================
 address-family ipv4 unicast vrf WAREHOUSE
  redistribute connected
 exit-address-family