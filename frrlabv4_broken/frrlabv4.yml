name: warehouse-evpn

topology:
  defaults:
    kind: linux
    binds:
      - ./daemons:/etc/frr/daemons

  nodes:
    # Management node
    management:
      kind: linux
      image: management-node:latest
      binds:
        - ./mgmt_id_ed25519:/root/.ssh/id_ed25519:ro

    # Core routers
    core1:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/core1.conf:/etc/frr/frr.conf

    core2:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/core2.conf:/etc/frr/frr.conf

    core3:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/core3.conf:/etc/frr/frr.conf

    core4:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/core4.conf:/etc/frr/frr.conf

    # Aggregation routers
    agg1:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/agg1.conf:/etc/frr/frr.conf
