      image: frrouting/frr:latest
      binds:
        - ./configs/agg6.conf:/etc/frr/frr.conf
    agg7:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/agg7.conf:/etc/frr/frr.conf
    agg8:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./configs/agg8.conf:/etc/frr/frr.conf

    # ToRs with SSH enabled
