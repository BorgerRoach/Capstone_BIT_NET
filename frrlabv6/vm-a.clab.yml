name: vm-a-core

topology:
  nodes:
    core-a:
      kind: linux
      image: frrouting/frr
      binds:
        - ../frr/core-a/core1.conf:/etc/frr/frr.conf
        - ../frr/core-a/daemons:/etc/frr/daemons

  links:
    - endpoints: ["core-t:eth1", "br-ac"]
    - endpoints: ["core-t:eth2", "br-at"]