name: vm-a-core

topology:
  nodes:
    core-a:
      kind: linux
      image: frrouting/frr
      binds:
        - ../frr/core-a/core1.conf:/etc/frr/frr.conf
        - ../frr/core-a/daemons:/etc/frr/daemons
      interfaces:
        - host-interface: br-ac   # A ↔ C (VBoxNet1)
        - host-interface: br-at   # A ↔ T (VBoxNet2)

