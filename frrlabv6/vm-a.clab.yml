name: vm-a-core

topology:
  nodes:
    core-a:
      kind: linux
      image: frrouting/frr
      binds:
        - ./frr/core-a/core1.conf:/etc/frr/frr.conf
        - ./frr/core-a/daemons:/etc/frr/daemons

    host:
      kind: host

  links:
    - endpoints: ["core-a:eth1", "host:veth-a-ac"]
    - endpoints: ["core-a:eth2", "host:veth-a-at"]