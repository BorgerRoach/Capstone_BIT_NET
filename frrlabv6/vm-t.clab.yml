name: vm-t-core

topology:
  nodes:
    core-t:
      kind: linux
      image: frrouting/frr
      binds:
        - ../frr/core-t/core1.conf:/etc/frr/frr.conf
        - ../frr/core-t/daemons:/etc/frr/daemons

  links:
    - endpoints: ["core-t:eth1", "br-ta"]
    - endpoints: ["core-t:eth2", "br-tc"]