frr defaults traditional
hostname core-a
service integrated-vtysh-config
!
interface eth1
 ip address 10.0.1.0/31
 ip ospf area 0
!
interface eth2
 ip address 10.0.2.0/31
 ip ospf area 0
!
interface lo
 ip address 10.255.0.1/32
!
interface vxlan10000
 vxlan id 10000
 vxlan local-tunnelip 10.255.0.1
 vxlan udp-port 4789
!
interface vlan10
 ip address 192.168.10.1/24
!
router ospf
 router-id 10.255.0.1
 network 10.0.1.0/31 area 0
 network 10.0.2.0/31 area 0
 network 10.255.0.1/32 area 0
!
router bgp 65000
 bgp router-id 10.255.0.1
 no bgp default ipv4-unicast
 neighbor C peer-group
 neighbor C remote-as 65000
 neighbor C update-source lo
 neighbor T peer-group
 neighbor T remote-as 65000
 neighbor T update-source lo
 neighbor 10.255.0.21 peer-group C
 neighbor 10.255.0.41 peer-group T
 !
 address-family ipv4 unicast
  network 192.168.10.0/24
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor C activate
  neighbor T activate
  advertise-all-vni
 exit-address-family
!
router evpn
 vni 10000 l2
  rd 10.255.0.1:10000
  route-target import 65000:10000
  route-target export 65000:10000
!
line vty
!