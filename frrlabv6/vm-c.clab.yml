name: vm-c-core

topology:
  nodes:
    core-c:
      kind: linux
      image: frrouting/frr
      binds:
        - ../frr/core-c/core1.conf:/etc/frr/frr.conf
        - ../frr/core-c/daemons:/etc/frr/daemons
      interfaces:
        - host-interface: br-ca   # C ↔ A (VBoxNet1)
        - host-interface: br-ct   # C ↔ T (VBoxNet3)


 