name: vm-c-core

topology:
  nodes:
    core-c:
      kind: linux
      image: frrouting/frr
      binds:
        - ../frr/core-c/core1.conf:/etc/frr/frr.conf
        - ../frr/core-c/daemons:/etc/frr/daemons

  links:
    - endpoints: ["core-t:eth1", "br-ca"]
    - endpoints: ["core-t:eth2", "br-ct"]