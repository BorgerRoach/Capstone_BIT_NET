name: vm-c-core

topology:
  nodes:
    core-c:
      kind: linux
      image: frrouting/frr
      binds:
        - ./frr/core-c/core1.conf:/etc/frr/frr.conf
        - ./frr/core-c/daemons:/etc/frr/daemons

    host:
      kind: host

  links:
    # C ↔ A
    - endpoints: ["core-c:eth1", "host:veth-c-ca"]

    # C ↔ T
    - endpoints: ["core-c:eth2", "host:veth-c-ct"]