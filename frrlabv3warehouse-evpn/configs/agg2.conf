frr defaults traditional
hostname agg2
service integrated-vtysh-config

interface lo
 ip address 10.255.0.12/32

interface eth1
 ip address 10.0.0.13/31

interface eth2
 ip address 10.0.2.10/31

interface eth3
 ip address 10.0.2.12/31

router bgp 65102
 no bgp ebgp-requires-policy
 bgp router-id 10.255.0.12

 neighbor 10.0.0.12 remote-as 65000
 neighbor 10.0.2.11 remote-as 65203
 neighbor 10.0.2.13 remote-as 65204

 !
 ! -------------------------
 ! IPv4 Unicast (unchanged)
 ! -------------------------
 address-family ipv4 unicast
  network 10.255.0.12/32
  redistribute connected
 exit-address-family

 !
 ! -------------------------
 ! EVPN Address-Family
 ! -------------------------
 address-family l2vpn evpn
  neighbor 10.0.0.12 activate
  neighbor 10.0.2.11 activate
  neighbor 10.0.2.13 activate
 exit-address-family