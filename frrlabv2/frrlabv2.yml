name: frr-evpn-v2

topology:
  nodes:
    core1:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./core/corefrr.conf:/etc/frr/frr.conf
      exec:
        - apt update
        - apt install -y frr iproute2

    tor1:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./agent/tor_agent.py:/usr/local/bin/tor_agent.py
        - ./tor1/tor1frr.conf:/etc/frr/frr.conf
      env:
        CONTROLLER_IP: "172.20.20.1"
        CONTROLLER_PORT: "5000"
        BRIDGE_IF: "br10"
      exec:
        - apt update
        - apt install -y python3 python3-pip iproute2 bridge-utils frr
        - pip3 install pyroute2
        - ip link add br10 type bridge
        - ip link set br10 up
        - chmod +x /usr/local/bin/tor_agent.py
        - /usr/local/bin/tor_agent.py &

    tor2:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./agent/tor_agent.py:/usr/local/bin/tor_agent.py
        - ./tor2/tor2frr.conf:/etc/frr/frr.conf
      env:
        CONTROLLER_IP: "172.20.20.1"
        CONTROLLER_PORT: "5000"
        BRIDGE_IF: "br20"
      exec:
        - apt update
        - apt install -y python3 python3-pip iproute2 bridge-utils frr
        - pip3 install pyroute2
        - ip link add br20 type bridge
        - ip link set br20 up
        - chmod +x /usr/local/bin/tor_agent.py
        - /usr/local/bin/tor_agent.py &

    hostA:
      kind: linux
      image: wbitt/network-multitool:latest

    hostB:
      kind: linux
      image: wbitt/network-multitool:latest

  links:
    - endpoints: ["core1:eth1", "tor1:eth1"]
    - endpoints: ["core1:eth2", "tor2:eth1"]
    - endpoints: ["tor1:eth2", "hostA:eth1"]
    - endpoints: ["tor2:eth2", "hostB:eth1"]