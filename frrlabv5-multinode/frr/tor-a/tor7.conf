frr version 9
frr defaults traditional
hostname tor-a7
log syslog informational
service integrated-vtysh-config

!
! Loopback
!
interface lo
 ip address 10.255.4.7/32
!

!
! Underlay link to agg-a2
! agg-a2:eth2 = 10.255.20.0/31
! tor-a7:eth1 = 10.255.20.1/31
!
interface eth1
 ip address 10.255.20.1/31
!

router bgp 65001
 bgp router-id 10.255.4.7
 no bgp default ipv4-unicast

 !
 ! iBGP to AGG-A2 (RR)
 !
 neighbor AGG-A2 peer-group
 neighbor AGG-A2 remote-as 65001
 neighbor AGG-A2 update-source lo
 neighbor 10.255.0.12 peer-group AGG-A2

 address-family l2vpn evpn
  neighbor AGG-A2 activate
  advertise-all-vni
 exit-address-family
!

evpn
 vni 10101 l2
  rd 10.255.4.7:10101
  route-target import 65101:10101
  route-target export 65101:10101
!

router ospf
 router-id 10.255.4.7
 network 10.255.0.0/16 area 0
!