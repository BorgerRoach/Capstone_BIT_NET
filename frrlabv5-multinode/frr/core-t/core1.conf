frr version 9
frr defaults traditional
hostname core-t
log syslog informational
service integrated-vtysh-config

!
! Loopback
!
interface lo
 ip address 10.255.0.41/32
 ip ospf area 0
 ip ospf passive

!

!
! Underlay links
! core-t:eth1 <-> agg-t1:eth1
!
interface eth1
 ip address 10.255.1.0/31
!

! core-t:eth2 <-> agg-t2:eth1
interface eth2
 ip address 10.255.1.2/31
!

! core-t:eth3 <-> agg-t3:eth1
interface eth3
 ip address 10.255.1.4/31
!

router bgp 65003
 bgp router-id 10.255.0.41
 no bgp default ipv4-unicast

 ! iBGP to AGG-T over underlay /31s
 neighbor 10.255.1.1 remote-as 65003
 neighbor 10.255.1.1 update-source eth1

 neighbor 10.255.1.3 remote-as 65003
 neighbor 10.255.1.3 update-source eth2

 neighbor 10.255.1.5 remote-as 65003
 neighbor 10.255.1.5 update-source eth3

 ! eBGP to CORE-A (AS 65001) via loopback
 neighbor CORE-A peer-group
 neighbor CORE-A remote-as 65001
 neighbor CORE-A update-source lo
 neighbor 10.255.0.1 peer-group CORE-A

 ! eBGP to CORE-C (AS 65002) via loopback
 neighbor CORE-C peer-group
 neighbor CORE-C remote-as 65002
 neighbor CORE-C update-source lo
 neighbor 10.255.0.21 peer-group CORE-C

 address-family l2vpn evpn
  neighbor 10.255.1.1 activate
  neighbor 10.255.1.3 activate
  neighbor 10.255.1.5 activate

  neighbor CORE-A activate
  neighbor CORE-C activate

  advertise-all-vni
 exit-address-family


router ospf
 router-id 10.255.0.41
 network 10.255.0.0/24 area 0
 network 10.0.3.1/31 area 0
 network 10.0.4.1/31 area 0
!