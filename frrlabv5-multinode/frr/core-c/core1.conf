frr version 9
frr defaults traditional
hostname core-c
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.255.0.21/32

router bgp 65002
 bgp router-id 10.255.0.21
 no bgp default ipv4-unicast

 neighbor AGG-C peer-group
 neighbor AGG-C remote-as 65002
 neighbor AGG-C update-source lo

 neighbor 10.255.0.31 peer-group AGG-C
 neighbor 10.255.0.32 peer-group AGG-C
 neighbor 10.255.0.33 peer-group AGG-C

 neighbor CORE-A peer-group
 neighbor CORE-A remote-as 65001
 neighbor CORE-A update-source lo
 neighbor 10.255.0.1 peer-group CORE-A

 neighbor CORE-T peer-group
 neighbor CORE-T remote-as 65003
 neighbor CORE-T update-source lo
 neighbor 10.255.0.41 peer-group CORE-T

 address-family l2vpn evpn
  neighbor AGG-C activate
  neighbor AGG-C route-reflector-client

  neighbor CORE-A activate
  neighbor CORE-T activate

  advertise-all-vni
 exit-address-family