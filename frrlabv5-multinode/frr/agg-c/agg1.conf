frr defaults traditional
hostname agg-c
service integrated-vtysh-config
!
interface eth1
 description to-core-c
!
interface eth2
 description to-tor-c
!
line vtyfrr version 9
frr defaults traditional
hostname agg-c1
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.255.0.31/32

router bgp 65002
 bgp router-id 10.255.0.31
 no bgp default ipv4-unicast

 neighbor CORE-C peer-group
 neighbor CORE-C remote-as 65002
 neighbor CORE-C update-source lo
 neighbor 10.255.0.21 peer-group CORE-C

 neighbor TOR-C1 peer-group
 neighbor TOR-C1 remote-as 65002
 neighbor TOR-C1 update-source lo

 neighbor 10.255.2.1 peer-group TOR-C1
 neighbor 10.255.2.2 peer-group TOR-C1
 neighbor 10.255.2.3 peer-group TOR-C1
 neighbor 10.255.2.4 peer-group TOR-C1
 neighbor 10.255.2.5 peer-group TOR-C1
 neighbor 10.255.2.6 peer-group TOR-C1

 address-family l2vpn evpn
  neighbor CORE-C activate
  neighbor TOR-C1 activate
  neighbor TOR-C1 route-reflector-client
  advertise-all-vni
 exit-address-family

evpn
 vni 10101 l2
  rd 10.255.0.31:10101
  route-target import 65101:10101
  route-target export 65101:10101