frr version 9
frr defaults traditional
hostname agg-c2
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.255.0.32/32

! core-c:eth2 <-> agg-c2:eth1
interface eth1
 ip address 10.255.1.3/31

! agg-c2:eth2 <-> tor-c7:eth1
interface eth2
 ip address 10.255.20.0/31

! agg-c2:eth3 <-> tor-c8:eth1
interface eth3
 ip address 10.255.20.2/31

! agg-c2:eth4 <-> tor-c9:eth1
interface eth4
 ip address 10.255.20.4/31

! agg-c2:eth5 <-> tor-c10:eth1
interface eth5
 ip address 10.255.20.6/31

! agg-c2:eth6 <-> tor-c11:eth1
interface eth6
 ip address 10.255.20.8/31

! agg-c2:eth7 <-> tor-c12:eth1
interface eth7
 ip address 10.255.20.10/31

router bgp 65002
 bgp router-id 10.255.0.32
 no bgp default ipv4-unicast

 neighbor CORE-C peer-group
 neighbor CORE-C remote-as 65002
 neighbor CORE-C update-source lo
 neighbor 10.255.0.21 peer-group CORE-C

 neighbor TOR-C2 peer-group
 neighbor TOR-C2 remote-as 65002
 neighbor TOR-C2 update-source lo

 neighbor 10.255.5.7 peer-group TOR-C2
 neighbor 10.255.5.8 peer-group TOR-C2
 neighbor 10.255.5.9 peer-group TOR-C2
 neighbor 10.255.5.10 peer-group TOR-C2
 neighbor 10.255.5.11 peer-group TOR-C2
 neighbor 10.255.5.12 peer-group TOR-C2

 address-family l2vpn evpn
  neighbor CORE-C activate
  neighbor TOR-C2 activate
  neighbor TOR-C2 route-reflector-client
  advertise-all-vni
 exit-address-family

evpn
 vni 10101 l2
  rd 10.255.0.32:10101
  route-target import 65101:10101
  route-target export 65101:10101

router ospf
 router-id 10.255.0.32
 network 10.255.0.0/16 area 0