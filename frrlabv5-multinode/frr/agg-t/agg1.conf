frr version 9
frr defaults traditional
hostname agg-t1
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.255.0.51/32

router bgp 65003
 bgp router-id 10.255.0.51
 no bgp default ipv4-unicast

 neighbor CORE-T peer-group
 neighbor CORE-T remote-as 65003
 neighbor CORE-T update-source lo
 neighbor 10.255.0.41 peer-group CORE-T

 neighbor TOR-T1 peer-group
 neighbor TOR-T1 remote-as 65003
 neighbor TOR-T1 update-source lo

 neighbor 10.255.3.1 peer-group TOR-T1
 neighbor 10.255.3.2 peer-group TOR-T1
 neighbor 10.255.3.3 peer-group TOR-T1
 neighbor 10.255.3.4 peer-group TOR-T1
 neighbor 10.255.3.5 peer-group TOR-T1
 neighbor 10.255.3.6 peer-group TOR-T1

 address-family l2vpn evpn
  neighbor CORE-T activate
  neighbor TOR-T1 activate
  neighbor TOR-T1 route-reflector-client
  advertise-all-vni
 exit-address-family

evpn
 vni 10101 l2
  rd 10.255.0.51:10101
  route-target import 65101:10101
  route-target export 65101:10101