frr version 9
frr defaults traditional
hostname agg-a1
log syslog informational
service integrated-vtysh-config

interface lo
 ip address 10.255.0.11/32

router bgp 65001
 bgp router-id 10.255.0.11
 no bgp default ipv4-unicast

 ! Upstream CORE-A
 neighbor CORE-A peer-group
 neighbor CORE-A remote-as 65001
 neighbor CORE-A update-source lo
 neighbor 10.255.0.1 peer-group CORE-A

 ! Downstream ToRs (tenant A1)
 neighbor TOR-A1 peer-group
 neighbor TOR-A1 remote-as 65001
 neighbor TOR-A1 update-source lo

 neighbor 10.255.1.1 peer-group TOR-A1
 neighbor 10.255.1.2 peer-group TOR-A1
 neighbor 10.255.1.3 peer-group TOR-A1
 neighbor 10.255.1.4 peer-group TOR-A1
 neighbor 10.255.1.5 peer-group TOR-A1
 neighbor 10.255.1.6 peer-group TOR-A1

 address-family l2vpn evpn
  neighbor CORE-A activate

  neighbor TOR-A1 activate
  neighbor TOR-A1 route-reflector-client

  advertise-all-vni
 exit-address-family

evpn
 vni 10101 l2
  rd 10.255.0.11:10101
  route-target import 65101:10101
  route-target export 65101:10101