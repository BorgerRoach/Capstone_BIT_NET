name: vm-a-lab

topology:
  nodes:
    core-a:
      kind: linux
      image: frrouting/frr
    agg-a:
      kind: linux
      image: frrouting/frr
    tor-a:
      kind: linux
      image: alpine

  links:
    - endpoints: ["core-a:eth1", "agg-a:eth1"]
    - endpoints: ["agg-a:eth2", "tor-a:eth1"]
    - endpoints: ["tor-a:eth2", "host-a1:eth1"]