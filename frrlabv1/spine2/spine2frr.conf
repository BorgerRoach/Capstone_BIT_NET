frr version 7.5.1
frr defaults traditional
hostname spine2
service integrated-vtysh-config
log syslog informational

interface eth1
 ip address 10.0.0.2/30
 ip ospf priority 50
 no shutdown
interface eth2
 ip address 10.0.0.6/30
 ip ospf priority 50
 no shutdown
interface eth3
 ip address 10.0.0.10/30
 ip ospf priority 50
 no shutdown
interface eth4
 ip address 10.0.0.14/30
 ip ospf priority 50
 no shutdown
interface eth5
 ip address 10.0.0.17/30
 ip ospf priority 50
 no shutdown
interface lo
 ip address 10.255.0.2/32
 no shutdown

router ospf
 ospf router-id 10.255.0.2
 network 10.0.0.2/30 area 0
 network 10.0.0.6/30 area 0
 network 10.0.0.10/30 area 0
 network 10.0.0.14/30 area 0
 network 10.0.0.17/30 area 0
 network 10.255.0.2/32 area 0

router bgp 65000
 bgp router-id 10.255.0.2

 neighbor LEAFS peer-group
 neighbor LEAFS remote-as 65000
 neighbor LEAFS update-source lo

 neighbor 10.255.1.1 peer-group LEAFS
 neighbor 10.255.1.2 peer-group LEAFS
 neighbor 10.255.1.3 peer-group LEAFS
 neighbor 10.255.1.4 peer-group LEAFS

 address-family l2vpn evpn
  neighbor 10.255.1.1 activate
  neighbor 10.255.1.2 activate
  neighbor 10.255.1.3 activate
  neighbor 10.255.1.4 activate

  neighbor 10.255.1.1 route-reflector-client
  neighbor 10.255.1.2 route-reflector-client
  neighbor 10.255.1.3 route-reflector-client
  neighbor 10.255.1.4 route-reflector-client

  advertise-all-vni
 exit-address-family

line vty
